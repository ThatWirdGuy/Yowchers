<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Research Module</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #screen_container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #status { position: fixed; top: 10px; left: 10px; z-index: 10; font-size: 12px; }
    </style>
</head>
<body>
    <div id="status">System: Ready. Press "~" to hide.</div>
    <div id="screen_container"><div id="screen"></div></div>

    <script src="libv86.js"></script>
    <script>
        window.addEventListener("keydown", (e) => {
            if (e.key === "~") window.location.replace("https://www.google.com");
        });

        window.onload = function() {
            if (typeof V86Starter === "undefined") {
                document.getElementById("status").innerText = "Error: Library Load Failed.";
                return;
            }

            var emulator = new V86Starter({
                wasm_path: "v86.wasm",
                memory_size: 512 * 1024 * 1024,
                vga_memory_size: 16 * 1024 * 1024,
                screen_container: document.getElementById("screen"),
                bios: { url: "bios/seabios.bin" },
                vga_bios: { url: "bios/vgabios.bin" },
                
                // We use a local image file that you will upload to GitHub
                // Rename your .iso or .img to .png to sneak it past filters
                hda: { url: "android.png" }, 
                
                autostart: true,
            });
        };
    </script>
</body>
</html>
