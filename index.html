<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Dashboard</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #screen_container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #status { position: fixed; top: 10px; left: 10px; z-index: 10; font-size: 12px; }
    </style>
</head>
<body>

    <div id="status">System: Initializing...</div>
    <div id="screen_container">
        <div id="screen"></div>
    </div>

    <script src="https://lib.arvancloud.ir/v86/0.12.0/libv86.js" onload="startEmulator()" onerror="handleLoadError()"></script>

    <script>
        // Panic Key: Press "~" to escape instantly
        window.addEventListener("keydown", function(e) {
            if (e.key === "~") window.location.replace("https://www.google.com");
        });

        function handleLoadError() {
            document.getElementById("status").innerHTML = "<span style='color:red;'>Filter Block Detected. Try using a personal hotspot or renaming libv86.js to libv86.png.</span>";
        }

        function startEmulator() {
            const status = document.getElementById("status");
            
            if (typeof V86Starter === "undefined") {
                status.innerText = "Internal Error: Library failed to parse.";
                return;
            }

            status.innerText = "Downloading Android OS... (Stay on this tab)";

            var emulator = new V86Starter({
                // Using the official WASM build
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: 512 * 1024 * 1024,
                vga_memory_size: 16 * 1024 * 1024,
                screen_container: document.getElementById("screen"),
                
                // Essential BIOS files
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                
                // Android 4.4 r5 ISO - This is the "Playable" file
                cdrom: { url: "https://archive.org/download/android-x86-4.4-r5/android-x86-4.4-r5.iso" },
                
                autostart: true,
            });

            emulator.add_listener("emulator-ready", function() {
                status.style.display = "none";
                console.log("Android is running.");
            });
        }
    </script>
</body>
</html>
