<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Data Processor</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #screen_container { width: 100vw; height: 100vh; display: flex; cursor: none; }
        #screen { margin: auto; }
    </style>
</head>
<body>

    <div id="screen_container"><div id="screen"></div></div>

    <script src="libv86.js"></script>

    <script>
        // --- PANIC KEY: Press "~" to hide instantly ---
        window.addEventListener("keydown", function(e) {
            if (e.key === "~") window.location.replace("https://www.google.com");
        });

        window.onload = function() {
            // Verifying the library loaded to fix your ReferenceError
            if (typeof V86Starter === "undefined") {
                document.body.innerHTML = "<h2 style='color:red;'>Error: libv86.js not found in GitHub repo.</h2>";
                return;
            }

            var emulator = new V86Starter({
                // Using .png extension for the wasm file to bypass basic filters
                wasm_path: "v86.wasm", 
                memory_size: 512 * 1024 * 1024,
                vga_memory_size: 16 * 1024 * 1024,
                screen_container: document.getElementById("screen"),
                
                // Paths to your BIOS and OS files
                bios: { url: "bios/seabios.bin" },
                vga_bios: { url: "bios/vgabios.bin" },
                
                // LIGHTWEIGHT ANDROID ISO (Link to a small version)
                cdrom: { url: "https://archive.org/download/android-x86-4.4-r5/android-x86-4.4-r5.iso" },
                
                autostart: true,
            });
        };
    </script>
</body>
</html>
